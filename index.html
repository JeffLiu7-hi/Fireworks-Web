<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>Fireworks</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Arial', sans-serif;
      color: #fff;
    }
    canvas {
      border: 1px solid #222;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="fireworks" width="800" height="600"></canvas>
  <script>
    const WIDTH = 800;
    const HEIGHT = 600;
    const canvas = document.getElementById('fireworks');
    const ctx = canvas.getContext('2d');

    function getVibrantColor() {
      const hue = Math.floor(Math.random() * 360);
      return `hsl(${hue}, 100%, 50%)`;
    }

    class Particle {
      constructor(x, y, color, explode = false) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.explode = explode;
        this.alive = true;

        if (explode) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 4 + Math.random() * 6;
          this.vx = Math.cos(angle) * speed;
          this.vy = Math.sin(angle) * speed;
          this.timer = 50 + Math.floor(Math.random() * 40);
          this.size = 2 + Math.random() * 2;
          this.decay = 0.96;
        } else {
          this.vx = -1 + Math.random() * 2;
          this.vy = -(13 + Math.random() * 5);
          this.timer = 100;
          this.size = 3;
          this.decay = 1;
        }
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.explode) {
          this.vy += 0.08;
          this.vx *= this.decay;
          this.vy *= this.decay;
          this.timer -= 1;
          if (this.timer <= 0) {
            this.alive = false;
          }
        } else {
          this.vy += 0.25;
        }
      }

      draw(context) {
        if (this.explode) {
          const size = this.timer < 15 ? this.size * (this.timer / 15) : this.size;
          if (size > 0.5) {
            context.fillStyle = this.color;
            context.beginPath();
            context.arc(this.x, this.y, size, 0, Math.PI * 2);
            context.fill();
          }
        } else {
          context.fillStyle = this.color;
          context.beginPath();
          context.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          context.fill();
        }
      }
    }

    class Firework {
      constructor() {
        this.x = 100 + Math.random() * (WIDTH - 200);
        this.y = HEIGHT;
        this.color = getVibrantColor();
        this.seed = new Particle(this.x, this.y, this.color, false);
        this.particles = [];
        this.exploded = false;
      }

      update() {
        if (!this.exploded) {
          this.seed.update();
          if (this.seed.vy >= 0) {
            this.explode();
          }
        } else {
          this.particles.forEach((particle) => particle.update());
          this.particles = this.particles.filter((particle) => particle.alive);
        }
      }

      explode() {
        this.exploded = true;
        const amount = 120 + Math.floor(Math.random() * 80);
        for (let i = 0; i < amount; i += 1) {
          const color = Math.random() > 0.2 ? this.color : 'rgba(255,255,255,1)';
          this.particles.push(new Particle(this.seed.x, this.seed.y, color, true));
        }
      }

      draw(context) {
        if (!this.exploded) {
          this.seed.draw(context);
        } else {
          this.particles.forEach((particle) => particle.draw(context));
        }
      }
    }

    let fireworks = [];

    function animate() {
      requestAnimationFrame(animate);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      if (Math.random() < 1 / 12) {
        fireworks.push(new Firework());
      }

      fireworks.forEach((firework) => {
        firework.update();
        firework.draw(ctx);
      });

      fireworks = fireworks.filter((firework) => !firework.exploded || firework.particles.length > 0);
    }

    animate();
  </script>
</body>
</html>
